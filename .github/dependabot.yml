version: 2
updates:
  # 1️ Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"             # GitHub Actions YAMLs are in root
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"

  # 2️ Keep frontend npm dependencies up to date
  - package-ecosystem: "npm"
    directory: "/frontend"    # Next.js frontend folder
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # 3️ Keep backend NuGet (.NET) dependencies up to date
  - package-ecosystem: "nuget"
    directory: "/backend"     # ASP.NET Core backend folder
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "csharp"
    commit-message:
      prefix: "chore"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
